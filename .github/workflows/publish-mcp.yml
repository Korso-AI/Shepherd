# Auto-publish the Shepherd MCP server (@korso/shepherd) to npm.
#
# Trigger: push a version tag like `v0.1.1`.
#   1. bump "version" in packages/mcp-server/package.json
#   2. commit, then:  git tag v0.1.1 && git push origin v0.1.1
#
# The job verifies the tag matches the package version, then publishes.
# `prepublishOnly` (tsup) runs automatically, so the published artifact is the
# bundled, self-contained build.
#
# Auth: npm **Trusted Publishing (OIDC)** — no token/secret required. GitHub mints
# a short-lived OIDC token (`id-token: write`), npm verifies it was issued to this
# repo + this workflow file, and publishes with provenance. Configure the trust
# once at npmjs.com → the package → Settings → Trusted Publisher (GitHub Actions,
# org `Korso-AI`, repo `shepherd`, workflow `publish-mcp.yml`).
#
# OIDC requires npm >= 11.5.1; the npm bundled with Node 20 is older, so we
# upgrade npm first.
#
# IMPORTANT: do NOT pass `registry-url` to actions/setup-node. It writes an
# .npmrc with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`; with no
# token secret that placeholder is empty. npm >= 11.6 treats an empty
# `_authToken` as "use token auth" and skips OIDC entirely, so publish fails
# with a misleading `E404` (a masked 401). Omitting `registry-url` leaves no
# auth config to shadow OIDC, and the default registry is npmjs.org anyway.
name: Publish MCP server

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: shepherd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Pinned to npm 11: npm@latest is now v12, which requires Node >= 22 and
      # fails EBADENGINE on this runner's Node 20.
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # Build the workspace so the internal @shepherd/shared package has a dist/
      # for esbuild to resolve and inline — without this, prepublishOnly's tsup
      # build fails with "Could not resolve @shepherd/shared".
      - name: Build workspace
        run: npm run build

      - name: Test
        run: npm test
        env:
          TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/shepherd_test

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/mcp-server/package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match packages/mcp-server/package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm (OIDC, no token)
        run: npm publish --workspace=@korso/shepherd
